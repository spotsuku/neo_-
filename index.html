<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO ACADEMIA — ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   ライトモード統一デザイン
══════════════════════════════════ */
:root{
  --bg:#f8fafc; --surface:#ffffff; --surface2:#f1f5f9; --surface3:#e2e8f0;
  --t1:#0f172a; --t2:#334155; --td:#64748b; --t-muted:#94a3b8;
  --border:#e2e8f0; --border2:#cbd5e1;
  --accent:#2563eb; --accent-lt:#dbeafe;
  --ok:#059669; --ok-lt:#d1fae5;
  --warn:#d97706; --warn-lt:#fef3c7;
  --ng:#dc2626; --ng-lt:#fee2e2;
  --purple:#7c3aed; --purple-lt:#ede9fe;
  --teal:#0891b2; --teal-lt:#cffafe;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow:0 4px 12px rgba(0,0,0,.08);
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}
/* ── TOP NAV ── */
.top-nav{
  position:sticky;top:0;z-index:200;
  background:var(--surface);border-bottom:2px solid var(--border);
  display:flex;align-items:stretch;padding:0 24px;
  box-shadow:var(--shadow-sm);
}
.top-logo{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--t1);
  padding:0 20px 0 0;margin-right:16px;border-right:1px solid var(--border);
  display:flex;align-items:center;white-space:nowrap;
}
.top-logo span{color:var(--accent);}
.top-tab{
  padding:0 22px;font-size:12px;font-weight:500;color:var(--td);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;
  gap:6px;letter-spacing:.5px;transition:all .15s;white-space:nowrap;height:52px;
}
.top-tab:hover{color:var(--t1);background:var(--surface2);}
.top-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
/* ── PANE ── */
.pane{display:none;height:calc(100vh - 54px);}
.pane.active{display:flex;}
.pane-scroll{display:none;height:calc(100vh - 54px);overflow-y:auto;background:var(--bg);}
.pane-scroll.active{display:block;}
.pane-scroll::-webkit-scrollbar{width:6px;}
.pane-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
/* ══ 企業別ダッシュボード ══ */
.sidebar{
  width:260px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sb-hd{padding:16px 16px 10px;border-bottom:1px solid var(--border);}
.sb-sub{font-size:9px;font-family:'Space Mono',monospace;color:var(--td);letter-spacing:2px;}
.sb-search{margin:8px 12px;position:relative;}
.sb-search input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:7px 10px 7px 28px;font-size:11px;color:var(--t1);
  font-family:'Noto Sans JP',sans-serif;outline:none;
}
.sb-search input:focus{border-color:var(--accent);background:var(--surface);}
.sb-search input::placeholder{color:var(--t-muted);}
.sb-search::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none;}
.sb-sec{
  padding:10px 14px 4px;font-size:9px;font-family:'Space Mono',monospace;
  color:var(--t-muted);letter-spacing:3px;text-transform:uppercase;
  background:var(--surface2);border-top:1px solid var(--border);
}
.sb-item{
  display:flex;align-items:center;gap:6px;padding:9px 14px;cursor:pointer;
  transition:background .12s;border-left:3px solid transparent;font-size:11px;color:var(--t2);
  border-bottom:1px solid var(--border);
}
.sb-item:hover{background:var(--accent-lt);color:var(--accent);}
.sb-item.active{background:var(--accent-lt);border-left-color:var(--accent);color:var(--accent);font-weight:600;}
.sb-no{font-size:9px;font-family:'Space Mono',monospace;color:var(--t-muted);width:18px;text-align:right;flex-shrink:0;}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-cnt{font-size:9px;color:var(--td);flex-shrink:0;}
.sb-badge{font-size:8px;font-family:'Space Mono',monospace;padding:2px 6px;border-radius:3px;flex-shrink:0;font-weight:700;}
.award-dot{font-size:11px;flex-shrink:0;}
.bs{background:var(--ok-lt);color:var(--ok);}
.ba{background:var(--accent-lt);color:var(--accent);}
.bb{background:var(--warn-lt);color:var(--warn);}
.bc{background:#fff7ed;color:#ea580c;}
.bd{background:var(--ng-lt);color:var(--ng);}
.bnew{background:var(--purple-lt);color:var(--purple);}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 36px 80px;background:var(--bg);}
.main::-webkit-scrollbar{width:6px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.page{display:none;animation:fi .25s ease;}.page.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
/* PAGE HEADER */
.ph{margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--border);}
.ph-no{font-family:'Space Mono',monospace;font-size:9px;color:var(--t-muted);letter-spacing:3px;margin-bottom:5px;}
.ph-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,3vw,48px);letter-spacing:2px;color:var(--t1);line-height:1.05;}
.ph-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;border:1px solid;}
.b-s{background:var(--ok-lt);color:var(--ok);border-color:#6ee7b7;}
.b-a{background:var(--accent-lt);color:var(--accent);border-color:#93c5fd;}
.b-b{background:var(--warn-lt);color:var(--warn);border-color:#fcd34d;}
.b-c{background:#fff7ed;color:#ea580c;border-color:#fdba74;}
.b-d{background:var(--ng-lt);color:var(--ng);border-color:#fca5a5;}
.b-new{background:var(--purple-lt);color:var(--purple);border-color:#c4b5fd;}
.b-n2{background:var(--surface2);color:var(--td);border-color:var(--border2);}
/* KPI GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.g2-info{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.kpi-card-c{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow-sm);text-align:center;}
.ct{font-size:9px;font-family:'Space Mono',monospace;color:var(--td);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:8px;}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;}
.kpi-sub{font-size:10px;color:var(--td);margin-top:3px;}
/* INFO PANEL */
.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.ip-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
/* POLICY PANEL */
.policy-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow-sm);}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.panel-title{font-size:9px;font-family:'Space Mono',monospace;color:var(--td);letter-spacing:3px;text-transform:uppercase;}
.reset-btn{font-size:10px;padding:4px 10px;border-radius:4px;background:var(--surface2);
  border:1px solid var(--border);color:var(--td);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;}
.reset-btn:hover{background:var(--ng-lt);color:var(--ng);border-color:#fca5a5;}
.pp-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;
  background:var(--warn-lt);color:var(--warn);border:1px solid #fcd34d;margin-bottom:10px;}
/* EDIT FIELD */
.pp-lbl{font-size:9px;font-family:'Space Mono',monospace;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:4px;display:flex;align-items:center;gap:6px;font-weight:600;}
.edit-btn:hover{opacity:1;background:var(--surface2);}
.edit-ta{min-height:70px;}
/* AWARD PANEL */
.award-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;transition:all .2s;box-shadow:var(--shadow-sm);}
.award-yes{border-color:#fcd34d;background:var(--warn-lt);}
.award-no{opacity:.7;}
.award-head-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.award-toggle{display:flex;align-items:center;gap:8px;}
.award-lbl-text{font-size:12px;font-weight:700;}
.award-yes .award-lbl-text{color:var(--warn);}
.award-no .award-lbl-text{color:var(--td);}
.toggle-switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--surface3);
  border-radius:20px;transition:.2s;border:1px solid var(--border2);}
.toggle-slider:before{position:absolute;content:'';height:14px;width:14px;left:2px;bottom:2px;
  background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input:checked + .toggle-slider{background:var(--warn-lt);border-color:#fcd34d;}
input:checked + .toggle-slider:before{transform:translateX(16px);background:var(--warn);}
/* COMPANY INNER TABS */
.c-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;}
.c-tab{padding:8px 16px;font-size:11px;font-weight:500;color:var(--td);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.c-tab:hover{color:var(--t1);background:var(--surface2);}
.c-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.tc{display:none;}.tc.active{display:block;}
/* MEMBER GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow-sm);}
.mc-hd{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;
  border-bottom:1px solid var(--border);background:var(--surface2);}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;margin-top:1px;font-weight:700;}
.mc-name{font-size:13px;font-weight:700;line-height:1.2;margin-bottom:3px;color:var(--t1);}
.mc-step{display:inline-flex;font-size:8px;font-family:'Space Mono',monospace;
  padding:2px 6px;border-radius:3px;font-weight:700;}
.mc-scores{display:flex;gap:8px;margin-left:auto;flex-shrink:0;}
.sc-s{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sc-v{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.sc-l{font-size:7px;color:var(--td);}
.mc-bd{padding:12px 14px;}
.ans-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.ans-chip{font-size:9px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:3px;
  border:1px solid;font-weight:600;}
.ans-ok{background:var(--ok-lt);color:var(--ok);border-color:#6ee7b7;}
.ans-no{background:var(--surface2);color:var(--t-muted);border-color:var(--border2);}
.skill-rows{margin-bottom:10px;}
.skill-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.skill-cat{font-size:8px;font-family:'Space Mono',monospace;color:var(--td);width:52px;flex-shrink:0;font-weight:600;}
.skill-chip{padding:2px 8px;border-radius:3px;font-size:9px;border:1px solid;font-weight:600;}
.sk-grow{background:var(--ok-lt);color:var(--ok);border-color:#6ee7b7;}
.sk-chal{background:var(--ng-lt);color:var(--ng);border-color:#fca5a5;}
.cmt-block{border-left:3px solid;padding:7px 10px;margin-bottom:8px;border-radius:0 4px 4px 0;background:var(--surface2);}
.cmt-label{font-size:8px;font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:3px;text-transform:uppercase;font-weight:700;}
.cmt-body{font-size:11px;color:var(--t2);line-height:1.75;}
.mc-flags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.fl{font-size:9px;padding:2px 7px;border-radius:3px;font-family:'Space Mono',monospace;font-weight:700;}
.fl-ok{background:var(--ok-lt);color:var(--ok);}
.fl-ng{background:var(--ng-lt);color:var(--ng);}
/* ENT Q */
.ent-q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow-sm);}
.sc-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.sc-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 14px;text-align:center;flex:1;min-width:80px;}
.sc-box-val{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;}
.sc-box-lbl{font-size:9px;color:var(--td);margin-top:3px;}
.ecb{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;margin-bottom:8px;}
.ecb-q{font-size:9px;font-family:'Space Mono',monospace;color:var(--td);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:5px;font-weight:700;}
.ecb-v{font-size:12px;color:var(--t2);line-height:1.8;border-left:3px solid var(--warn);padding-left:10px;}
.no-data{padding:20px;text-align:center;color:var(--td);font-size:12px;}
.no-data-sm{font-size:11px;color:var(--td);padding:4px 0;}
/* ══ SURVEY UI ══ */
.sv-content{padding:32px 44px 80px;}
.sv-hd{display:flex;align-items:center;gap:12px;margin:28px 0 16px;font-size:14px;font-weight:700;
  color:var(--t1);padding-bottom:10px;border-bottom:2px solid var(--border);}
.sv-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;
  font-family:'Space Mono',monospace;flex-shrink:0;}
.sv-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.sv-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.sv-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);}
.sv-ptitle{font-size:11px;font-weight:700;color:var(--td);letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 16px;box-shadow:var(--shadow-sm);}
.kpi-lbl{font-size:11px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.kpi-body{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
.kpi-q{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.kpi-q-hi{flex:1.2;}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;letter-spacing:1px;}
.kpi-v-lg{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;letter-spacing:1px;}
.kpi-ql{font-size:10px;color:var(--td);text-align:center;line-height:1.5;}
.kpi-n{font-size:9px;color:var(--t-muted);}
.kpi-unit{font-size:9px;color:var(--td);margin-top:6px;}
.arr{font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0;}
.arr.up{color:var(--ok);background:var(--ok-lt);}
.arr.dn{color:var(--ng);background:var(--ng-lt);}
.arr.nt{color:var(--td);background:var(--surface2);}
.seg-row{display:flex;gap:12px;flex-wrap:wrap;}
.seg-card{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.seg-name{font-size:12px;font-weight:700;margin-bottom:10px;}
.seg-scores{display:flex;gap:12px;}
.seg-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.seg-v{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}
.seg-l{font-size:9px;color:var(--td);}
.step-grid{display:flex;align-items:flex-end;gap:10px;height:120px;padding-bottom:28px;}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;}
.step-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;background:var(--surface2);border-radius:4px 4px 0 0;}
.step-bar-fill{width:100%;border-radius:4px 4px 0 0;}
.step-lbl{font-size:10px;font-weight:700;color:var(--td);margin-top:4px;}
.step-v{font-size:11px;color:var(--t1);font-weight:600;}
.hbar-list{display:flex;flex-direction:column;gap:10px;}
.hbar-item{}
.hbar-lbl{display:flex;justify-content:space-between;margin-bottom:4px;}
.hbar-txt{font-size:11px;color:var(--t2);}
.hbar-n{font-size:11px;font-weight:700;color:var(--t1);}
.hbar-trk{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;}
.donut-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-around;}
.donut-card{display:flex;flex-direction:column;align-items:center;flex:1;min-width:90px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;}
.donut-lbl{font-size:10px;color:var(--td);font-weight:600;text-align:center;margin-bottom:6px;line-height:1.4;}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.donut-cnt{position:absolute;display:flex;align-items:center;justify-content:center;}
.donut-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
.donut-sub{font-size:10px;color:var(--td);margin-top:6px;}
.time-legend{display:flex;gap:14px;margin-bottom:12px;font-size:11px;color:var(--td);align-items:center;}
.tleg-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
.time-rows{display:flex;flex-direction:column;gap:12px;}
.time-row{display:flex;flex-direction:column;gap:4px;}
.time-lbl{font-size:11px;color:var(--t2);font-weight:500;}
.time-bar-pair{display:flex;align-items:center;gap:8px;}
.time-v{font-size:10px;font-weight:700;color:var(--t1);width:20px;text-align:right;flex-shrink:0;}
.time-trk{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.s-n-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.s-n-badge{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 16px;display:flex;flex-direction:column;align-items:center;box-shadow:var(--shadow-sm);}
.s-n-hi{border-color:#93c5fd;background:var(--accent-lt);}
.s-n-v{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1;}
.s-n-l{font-size:9px;color:var(--td);font-family:'Space Mono',monospace;letter-spacing:1px;margin-top:3px;}
.ent-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px;}
.ent-tab{padding:10px 24px;font-size:12px;font-weight:500;color:var(--td);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.ent-tab:hover{color:var(--t1);background:var(--surface2);}
.ent-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.ent-tc{display:none;}.ent-tc.active{display:block;}
.ent-tab-content{padding-top:4px;}
.ent-score-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.ent-score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow-sm);}

らが忙しさを理由に不安を訴えたため「できる範囲でいいから参加してほしい」と言ったのが良くなかったのかと反省しています。", "成長実感": 5.0, "成長コメント": "何を聞いても、具体的なフィードバックがなく、図りかねているところです。周囲の社員に聴くと、重永は自分がハマればのめりこむが、ハマらないと距離を置くタイプ。ヒョニはいろいろなことに興味がありすぎて、何事も浅くなりがちだというので、それが表れているのかなと思います。", "選抜生変化": "企業選抜生が私とは少し遠い部署にいるので、直接的な実感がありません。", "おすすめ度": 10.0, "おすすめコメント": "参加しない理由がありません。企業選抜生にとっても、企業担当者にとっても、学びと出会いでお釣りがくると思います。", "授業満足": 10.0, "評議会満足": 8.0, "応援会議満足": 8.0, "広報価値": "感じている", "広報価値コメント": "AWARDに対し、様々な若者から質問を受けたり「KBCの課題は、アカデミア生から人気ですよ」と言われたりすると、ありがたいなと思います。ただ、社外の若者から「KBCはNEOに参加してますよね」と言われたことは、現時点ではありません。", "企業反映": "ある", "企業反映コメント": "私がKBC社内でNEOを布教しており、私の周辺から徐々にNEOファミリーを増やしているところです。「オーガスタ」でコラボできたことをきっかけに、「ハイスク祭」でコラボできたら、もっと目に見えた連携になるので、更に社内で変化が起きると期待しています。", "来期継続": "継続希望だが調整が必要", "継続理由": "やめる理由がないと思います。1年目は、全体像がわからないまま参加し、後から「こういうことだったのね」と思うことも多く、社内で説明するのが難しかったのですが、2年目以降は、一度経験したことを踏まえ、自分の言葉で伝えられるので、より多くの人を巻き込みたいと思っています。社内でもネガティブな意見はありませんが、継続には機関決定が必要ですので「調整が必要」を選択させていただきました。", "お困りごと": "イベントの具体的な内容の把握, 誰がどのイベントに参加したら良いか, 自社の企業選抜生の活動状況の把握, 企業選抜生の業務負担増加", "アイデア": "NEOのメンバーが寝ずに頑張っているのはよく理解できます。ですから、多少の無茶ぶりも対応する覚悟で参加していますが、2年目以降はサステナビリティを意識してはどうかと思います。社会で経済活動している企業は本業を抱え、法令を遵守し、社員の生活を守る義務もあります。NEO福岡が経済団体を名乗り、永く活動し続けるためには、勢いだけでは厳しい局面が出てくるのではないかと思っています。例えば、AWARDは、企画案が11/1（土）企業側に共有され、エントリーが7社を超える場合は、4（火）午前中までに選抜する必要がありますが、これは企業担当者に、休日の対応を求めることになります。私も西村も、快く引き受けていますが、全ての参加企業が同じ気持ちで気持ち良く応対しているのかな？と、気になりました。今年は初年度なので、NEOの皆さんも手探りで、ギリギリのスケジュールで進めていると思います。その姿勢を心からリスペクトしているので、応援していますが、2年目、3年目もカツカツのスケジュールだと、今度はスケジュール管理を問われることになると思います。あまりにも優等生になると、NEOのとんがった良さがなくなりそうで難しいのですが、2年目以降、スケジュール的に余裕を持つだけでも、NEOの信頼度が、もっと増すのではないかと思います。"}, "ent2": {"担当者": "松尾 恵美", "役職": "経営戦略室長", "満足度": null, "満足コメント": "企業から課題を出したことで、アカデミア生のみなさんと顔が見える関係になることができました。表面的な関係ではなく、いいものはいい、ダメなものはダメと相手をリスペクトしながら率直な意見交換ができたのではないかと思います。また、メンター壁打ち会では、他企業にエントリーしている別の若者と話すことができましたが、私自身、本気で挑んだので、短い時間でしたが、とっても疲れました（笑）。これは、とてもいいことだと受け止めていて、50歳を過ぎてもこうして本気で何かに向き合うことができたのは、本当に記憶に残るいい経験でした。ただ、KBCを選んでくれた和コネクトの皆さんには、もっといいアドバイスができたんじゃないかと思うこともあります。", "成長実感": null, "成長コメント": "企業選抜生というより、私自身の課題だと思いますが、彼らにどう寄り添ったらいいのか、どこまで介入したらいいのか探りながら2学期が終わった印象です。もっと関われば彼らがコミットするきっかけを作れたかもしれませんが、あまり関わりすぎると重荷になりそうで、彼らに対しては一歩引いた距離感で過ごしていました。それが良かったのかどうか、悶々としているため、6点としました。重永も金も、新しい環境で得たものはあったと思います。私が期待しすぎなのかもしれません。", "選抜生変化": "もともと企業選抜生との関係性が近くない部署で、彼らの仕事ぶりを直接見る機会はありませんでしたが、社内で大きな変化があったという実感は、残念ながら得られていません。", "おすすめ度": null, "おすすめコメント": "これからの時代は「競争」ではなく「共創」により発展すると思います。その時代において、様々な世代の方、様々なバックグラウンドを持つ方と出会えるのは、かけがえのない宝になると思います。NEOは一義的には若者とのタッチポイントを作る場という位置づけですが、実態としては、40代以上の素敵な大人の皆さまとも多く出会えるので、参加しない意味がないと思います。", "応援会議満足": null, "評議会満足": null, "広報価値": "感じている", "広報価値コメント": "定量的に広報価値の指標をチェックした訳ではないので、なんとも言えませんが、NEOで出会う若者の皆さんと話しているだけでも、KBCに関心を持っていただいていることを感じるので、効果を感じています。", "企業反映": "ある", "企業反映コメント": "アカデミア生以外の社員を巻き込むと、みんな高い関心を持ち、応援してくれる印象を受けました。「NEOと何かできるかもしれない」というポテンシャルを感じました。", "コラボ": "いいえ", "コラボ事例": "", "AWARD満足度": null, "AWARD満足コメント": "足りない1点は、弊社がもっとできたことがあったんじゃないかなというところです。若者が必死で考えていることに対し、答えるスキルが不足していたように思います。", "PJ実行強度": "少し期待以上", "PJコメント": "期待以上の部分と、期待以下の部分があるため、平均して「少し期待以上」を選びました。主に櫻木彩乃ちゃんですが、考えが非常に深く、それをやり切る姿は素晴らしいですし、地頭の良さを非常に感じます。初めて彩乃ちゃんの構想を聞いた時は「こんなに深く物事を考える若者がいるんだ」とたまげました。彩乃ちゃんは、どこにいっても活動している印象で、彩乃ちゃんが福岡に3人くらいいるんじゃないかとも思うほどです。一方、若いので当然のことながら未熟な反面もあり、事業化を目指したいと言いながら、理想に引きずられすぎて、なかなか本題に入らず頭でっかちのリサーチを続けたり、どうすれば利益を出せるか？それをやるのにいくらかかるのか？という視点が圧倒的に不足していると思います。大学2年生ですから、当然のことだと思います。私は54歳になってもできないことです。それも含めて、彩乃ちゃんを含めたメンバーのことが大変かわいらしいですし、応援しています。ただ、情に流されて、妥協するのはとても良くないので、そうならないように私自身も客観的な視点を忘れないようにしようと思います。成末茜ちゃんは、唯一の高校生で、よくぞ参加してくれたと思いますが、いつも無口で、ほとんど話さないので、もう少し前に出てほしいなと思うこともあります。NEOの皆さんは「茜ちゃんはスイッチが入ったらよく話す」とおっしゃるんですが、私は10月（？）のプレゼンの場でしかそれを見たことがなく、普段からその姿を見せてほしいなと思います。でも、大学生・社会人と、自分の親と同じくらいの人に対して、こうして関わってくれるだけでもすごいと思います。", "PJ継続": "検討中", "PJ継続理由": "現時点では収益構造が全く見えていないので、事業化するのはかなりハードルが高いと思います。ただ、弊社が取り組もうとしている新規事業（アウトバウンドや宿泊事業）と連携させるポテンシャルはあると思います。2月のモニターツアーが終わったところで、その後、どのように進めるのか話そうと思いますが、そもそも単独で事業化は難しいので、上記選択肢はないと思います。", "アイデア": "私はNEOの皆さんが猛ダッシュしながら考え、やりきっていることは理解していますが、これからNEOを成長させていくならば、サステナブルな組織にすることは大事だと思います。以前もお伝えしたことがあり、随分改善されたと思いますが、企業担当者に連絡する際、回答までの日数を十分確保するとか、土日は休みとして確保するなど、パ ポジティブな変化を続けていくと思います。中長期的な視点で考えると、参加しない理由がないと思います。", "評議会満足度": 9.0, "広報価値": "とても感じている", "広報価値コメント": "YEAR END PARTYでMost Playful Supporter賞をいただいたことが、大変うれしかったです。私個人というよりも、KBCグループのプレゼンスを、参加している皆さんに少しでも感じていただくことができたと思っています。若者向けの広報価値は、単年では測れないと思います。NEOに参加して、数年後、「なぜKBCは若者に支持されているのか？」と、問われた時、「NEO福岡に参加しているから」と言えるような未来を創りたいと思っています。", "社内報告会": "いいえ", "社内報告会内容": "今現在は余裕がなく着手できていません。", "企業反映": "ある", "企業反映コメント": "新規事業メンバーのNEOに対する理解が深く、「いつか何かを一緒にやれたらいいね」と話しています。NEOに共感するメンバーを、NEO AWARDに呼んだり、和コネクトメンバーとの食事会に、新規事業メンバーを呼んだりして、関わる人口を少しずつ増やしています。", "面談希望時期": "4月, 5月, 6月, 7月, 8月, 9月, 10月, 11月, 12月, 1月, 2月, 3月", "面談コメント": "いつでもどうぞ。", "コラボ有無": "いいえ", "コラボ事例": "", "繋がりたい企業": "繋がりたい企業は特にない", "繋がりたい理由": "在福の企業様とは、営業部門・人事部門等ですでにお付き合いがあるため、経営戦略主導のコラボレーションは、今のところ不要です。", "運営満足度": 10.0, "運営満足コメント": "一年前は、何をどうやるのか、全く見えない状況でしたが、ほんの一年でここまで形にするNEOは本当にすごいと思いました。", "1年満足度": 9.0, "1年満足コメント": "全体を通じては大満足ですが、唯一の心残りは、企業派遣生のことです。私がもっとケアすればよかったのか、そもそもの人選方法を変えた方が良かったのか。関わってくれた重永・金も、わからない中で、よく手を挙げてくれたと感謝していますが、私自身、もっとできることがあったんじゃないかと、モヤモヤしています。", "NEOアイデア": "一年目は、走りながら創り上げたところがあると思いますが、二年目はそのフレーズが使えなくなると思うので、一つの企業として、ビジネスの常識に則った行動が重要になると思います。すでに改善に着手されていると認識していますが、活動スケジュールを明確にしたり、時間に余裕をもって調整することは、今後不可欠だと思います。一点、具体的な改善点を申し上げると、Year End Partyで配布された冊子で、森がどう取り上げられるか、本人が理解しないまま、当日を迎えていたようです。森は、当日会場に来て、冊子を見て、参加企業では自分のインタビューだけが掲載されることを知ったようです。森は、決して怒っている訳ではなく、むしろ冊子の内容に感動していて、自分以外のページも読み込み、私に読書感想文を送ってくるほどでしたが、次回、企業に対して、何かを依頼される時は、5W1Hを明確にして、仕上がり全体がわかるような形にした方がいいと思いました。", "AWARD関わり方": "A. NEO AWARD/CITY FESにテーマを出した", "CITYFES満足度": 10.0, "CITYFES満足コメント": "CITY FESが何なのか、明確な確証がないまま参加しましたが、NEOがこれだけのことをなし得たことに、心から感動しています。和コネクトのメンバーについても、本当に一生懸命で、本気で取り組んでいるので、私も西村も、本気で応援しました。雪でモニターツアーを延期にすることになった時は、私たち自身も非常に学ばせていただきました。和コネクトメンバーをはじめとする、皆さんに出会えて本当に良かったと思えた「とどめ」がCITY FESだったと思います。", "成果物満足度": null, "成果物満足コメント": "モニターツアーは3/7（土）開催なので、これからですが、その過程の打ち合わせでは、彼らの思考の深さを感じる場面が何度もありました。和コネクトが掲げるコンセプトや、実現したいものがとても良く分かりました。やりたいことを言語化して、実現する力はすごいと思います。私たちからのアドバイスに対しても、本当に素直に聞いてくれて、彼らとの打ち合わせは終始ノンストレスでした。CITY FESで開催した陶芸体験も、天神であのような貴重な体験ができて、楽しく、癒されました。私と西村は、時折壁打ちしただけで、イベントの実行は完全に彼らが仕切ったので、本当にすごいなと思います。", "貴社変化": "はい", "貴社変化コメント": "これまで「NEOに参加して良かったと、自分の選択肢を正解にしよう」と考え、行動してきましたが「NEOに参加して正解だった」と確信できたことは、とても大きかったです。3年契約を決めた時点で、確信していたと言えば、確信していたのですが、さらにそれが強く補強された感じです。また、弊社役員（森・宍道）も、実際にAWARDを見たり、CITY FESに参加し、こうした他流試合が弊社社員にとって重要であると、改めて感じたと話していました。", "PJ進め方": "今後のプロジェクト継続は考えていません。和コネクトメンバーからも、これで一旦区切りをつけると聞いています。ただし、弊社のアウトバウンド事業と、和コネクトが考えていることは、相性がいいので、いつか何か一緒にできたらいいなと思っています。", "PJ方針": "現状では、まだ具体的な方針は見えていません。", "AWARD困りごと": "特に困ったことはなかった", "AWARD困りごと詳細": "", "他社PJ参加": "はい", "投下時間実際": "週1〜5時間", "投下時間理想": "週1〜5時間", "報告頻度": "報告はなかった", "懸念改善点": "本業との両立というのが一番大きな課題です。弊社は番組制作現場に若手が多く配属されています。番組制作現場にいる、どうしても突発の事件事故や、取材対象の都合で、急な仕事が入ることがあるため、アカデミア生として派遣するのが難しいです。加えて、制作現場は時間外が多いため、NEOに出しにくいというところがあります。制作現場でなくても、上司が「この人は忙しいから」「今、この業務に集中させたいから」と、プロテクトするケースがあります。個人的には、忙しさを言い訳にしているうちは、成長できないと思っているんですが、働き方改革を推進しているところもあり、本音を非常に言いづらい状況もあります。", "その他": "一年間、本当にありがとうございました。NEOに出会えていないKBC、NEOに出会えていない自分を想像できないくらい、NEOが日常の中に溶け込んでいます。Year End PartyでMost Playful Supporterに選んでいただきましたが、私自身、誰に対しても同じようにコミットしている訳ではありません。私がNEOに全力でコミットできたのは、NEOの皆さんが全力だったからです。全力でフルスイングしている人に対し、いい加減なボールを投げる訳にはいかないと思ったのが、私のモチベーションになりました。NEOの全てを知っている訳ではありませんが、NEOが行うプロジェクトの全て、いただく提案、成果物、発信される内容、送られてくるメールの内容・時間に至る全てから、本気度が伝わってきました。「こりゃ、NEOのメンバーは寝てないな」と、思ったことも、一度や二度ではありません。そのような人を目の前にして、「私は企業担当者だから」と、一段高いところに立ち、評論家になるのは絶対イヤだと思いました。だから、壁打ち会でも、喉がカラカラになり、手汗をかきながらも、皆さんと向き合うことができたのだと思います。全ては皆さんの行動が生み出した結果だと思います。心からお礼を申し上げます。NEOが福岡に来てくれて、本当にありがとうございました。"}, {"企業名": "山九株式会社", "担当者": "原 亮太", "役職": "担当部長", "参加プログラム": "ライジングゼファー福岡 NEO冠試合（2/9）", "満足度": 5.0, "満足コメント": "選抜生の業務と当該活動の両立がうまく出来なかったため。また、私を含めた弊社担当者も未来評議会等の活動に参加出来なかった。（福岡、北九州の距離間も参加への障壁）", "成長実感": 7.0, "成長コメント": "NEOアワードの活動にはWEBでの打合せを行っていたが、業務との輻輳により、なかなか参加が出来なかった。", "学習効果": "はい", "学習効果コメント": "・異なる背景を持つ人々との交流を通じて、多様なコミュニケーションスキルを磨くことが出来た。", "選抜生変化": "仕事の視座が上がった, ユース選抜の方たち業務スタイル（slackやAI活用）に刺激を受けていた。", "おすすめ度": 6.0, "おすすめコメント": "新規事業企画部門に携わる者であれば、業務に付帯する活動になり得るが、客先対応を持つ社員である場合、両立が難しい。また、博多中心であるため、遠方企業は平日参加が難しい。", "評議会満足       + ' onblur="' + onblur + '" oninput="autoResize(this)">'
      + esc(value) + '</textarea>'
    : '<input id="' + id + '" class="' + cls + '" type="text" placeholder="' + placeholder + '"'
      + ' value="' + esc(value) + '"'
      + ' onblur="' + onblur + '"'
      + ' onkeydown="handleEditKey(event,&quot;' + id + '&quot;,&quot;' + no + '&quot;,&quot;' + field + '&quot;)"'
      + '>';
  return '<div class="edit-field" data-no="' + no + '" data-field="' + field + '">'
    + '<div class="pp-lbl" style="color:' + (color || 'var(--td)') + '">' + label + '</div>'
    + inp

function handleEditKey(e, id, no, field) {
  if (e.key === 'Enter') { e.preventDefault(); autoSave(id, no, field); document.getElementById(id).blur(); }
  if (e.key === 'Escape') { document.getElementById(id).blur(); }
}
function autoSave(id, no, field) {
  var inp = document.getElementById(id);
  if (!inp) return;
  var val = inp.value.trim();
  saveEdit(no, field, val);
  inp.classList.remove('edit-saved-flash');
  void inp.offsetWidth; // reflow
  inp.classList.add('edit-saved-flash');
  showToast('保存しました');
}
function autoResize(el) {
  el.style.height = 'auto';

/* ── メンバーカード (機能3: 詳細トグル) ── */

    +'<div style="flex:1">'

    +(step?'<div class="mc-step" style="background:'+(isHigh?'#d1fae5':'#dbeafe')+';color:'+(isHigh?'#059669':'#2563eb')+'">'+esc(step.split('.')[0])+'</div>':'')

function buildEntQ(ent,q){

  var cmtKeys=[
    ['満足コメント','満足度コメント','#2563eb'],['派遣満足コメント','派遣満足コメント','#2563eb'],
    ['成長コメント','成長コメント','#059669'],['選抜生変化','選抜生の変化','#059669'],
    ['おすすめコメント','おすすめコメント','#7c3aed'],['広報価値','広報価値','#0891b2'],

    ['PJ実行強度','PJ実行強度','#7c3aed'],['PJコメント','PJコメント','#7c3aed'],
    ['PJ継続','PJ継続方針','#2563eb'],['PJ継続理由','PJ継続理由','#2563eb'],
    ['来期継続','来期継続意向','#059669'],['継続理由','継続理由','#059669'],
    ['1年満足コメント','1年間総合コメント','#2563eb'],['PJ方針','PJ方針','#2563eb'],
    ['お困りごと','お困りごと','#dc2626'],['アイデア','改善アイデア','#64748b'],
    ['学習効果コメント','学習効果','#0891b2'],
  ];
  var cmts='',seen={};

function scColor(v){var n=parseFloat(v);if(isNaN(n))return'#9ca3af';if(n>=8)return'#059669';if(n>=6)return'#d97706';return'#dc2626';}
function buildKpiCards(items){
  // items = [{label, q1, q2, q3, n1, n2, n3}]
  var html='<div class="kpi-row">';
  items.forEach(function(it){
    var arrow=function(a,b){
      if(a==null||b==null)return'';
      var d=parseFloat((b-a).toFixed(2));
      return d>0?'<span class="arr up">▲'+Math.abs(d)+'</span>':d<0?'<span class="arr dn">▼'+Math.abs(d)+'</span>':'<span class="arr nt">→</span>';
    };
    var q=function(v,n,big){
      return'<div class="kpi-q'+(big?' kpi-q-hi':'')+'"><div class="kpi-v'+(big?' kpi-v-lg':'')+'" style="color:'+scColor(v)+'">'+(v!=null?v:'—')+'</div>'
        +'<div class="kpi-ql">'+(it['ql']||'')+'<br><span class="kpi-n">n='+(n||'—')+'</span></div></div>';
    };
    html+='<div class="kpi-card"><div class="kpi-lbl">'+it.label+'</div>'
      +'<div class="kpi-body">'
      +q(it.q1,it.n1,false)+arrow(it.q1,it.q2)
      +q(it.q2,it.n2,false)+arrow(it.q2,it.q3)
      +q(it.q3,it.n3,true)
      +'</div><div class="kpi-unit">/10</div></div>';
  });
  return html+'</div>';
}
function buildHBar(data,color,maxRef){
  var vals=Object.values(data).map(Number);
  var max=maxRef||Math.max.apply(null,vals)||1;
  var html='<div class="hbar-list">';
  Object.entries(data).sort(function(a,b){return b[1]-a[1];}).slice(0,8).forEach(function(e){
    var pct=Math.round(Number(e[1])/max*100);
    html+='<div class="hbar-item"><div class="hbar-lbl"><span class="hbar-txt">'+esc(e[0])+'</span><span class="hbar-n">'+e[1]+'</span></div>'
      +'<div class="hbar-trk"><div class="hbar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
  });
  return html+'</div>';
}
function buildDonut(pct,color,label,sub){
  var r=36,circ=2*Math.PI*r,offset=circ*(1-pct/100);
  return'<div class="donut-card"><div class="donut-lbl">'+label+'</div>'
    +'<div class="donut-wrap"><svg viewBox="0 0 90 90" width="88" height="88">'
    +'<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="#e5e7eb" stroke-width="8"/>'
    +'<circle cx="45" cy="45" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="8" stroke-linecap="round"'
    +' stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"'
    +' transform="rotate(-90 45 45)"/></svg>'
    +'<div class="donut-cnt"><div class="donut-pct" style="color:'+color+'">'+pct+'%</div></div>'
    +'</div><div class="donut-sub">'+sub+'</div></div>';
}

function buildEnterpriseTab() {

  function noE(v){ return v&&String(v).trim()&&String(v).trim()!=='nan'&&String(v).trim()!=='None'; }
  function scC(v){ var n=toF(v); return n==null?'#94a3b8':n>=8?'#059669':n>=6?'#d97706':'#dc2626'; }
  function scBig(v,label){
    var html = v!=null&&v!='None'
      ? '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:38px;color:'+scC(v)+'">'+v+'</span><span style="font-size:11px;color:#94a3b8">/10</span>'
      : '<span style="color:#94a3b8;font-size:18px">—</span>';

  // ── 水平バー ──
  function hbar(data, color) {
    if(!data||!Object.keys(data).length) return '<div style="color:#94a3b8;font-size:12px;padding:8px">データなし</div>';

        +'<div class="ed-hbar-top"><span class="ed-hbar-lbl">'+esc(e[0])+'</span><span class="ed-hbar-n">'+e[1]+'</span></div>'

        +'</div>';

      var d=parseFloat((b-a).toFixed(1));

               :d<0?'<span style="color:#dc2626;font-size:9px;font-weight:700;padding:1px 4px;background:#fee2e2;border-radius:3px;margin:0 3px">▼'+Math.abs(d)+'</span>'

      +'<div class="ed-kpi-label">'+label+'</div>'

function switchEntTab(el){
  var cont=el.closest('.sv-content');
  cont.querySelectorAll('.ed-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  cont.querySelectorAll('.ed-tc').forEach(function(tc){tc.classList.remove('active');});
  var t=document.getElementById(el.getAttribute('data-tid'));
  if(t) t.classList.add('active');
}

var STATUS_KEY  = 'neo_cont_status';

var INVOLVE_KEY_MB = 'neo_mb_involve';
function getLS(key){ try{ return JSON.parse(localStorage.getItem(key)||'{}'); }catch(e){ return {}; } }
function setLS(key, obj){ localStorage.setItem(key, JSON.stringify(obj)); }
function getStatus(no){  return (getLS(STATUS_KEY)[no]  || ''); }
function getCoInvolve(no){ return (getLS(INVOLVE_KEY_CO)[no] || ''); }
function getMbInvolve(name){ return (getLS(INVOLVE_KEY_MB)[name] || ''); }
function saveStatus(no, val){ var s=getLS(STATUS_KEY); s[no]=val; setLS(STATUS_KEY,s); showToast(val?val+'に設定':'ステータスをクリア'); }
function saveCoInvolve(no, val){ var s=getLS(INVOLVE_KEY_CO); s[no]=val; setLS(INVOLVE_KEY_CO,s); showToast(val?val+'に設定':'関与度をクリア'); }
function saveMbInvolve(name, val){ var s=getLS(INVOLVE_KEY_MB); s[name]=val; setLS(INVOLVE_KEY_MB,s); showToast(val?val+'に設定':'関与度をクリア'); }

/* ── ユーザー一覧 ── */
function buildUserListTab() {
  var ms = ALL_MEMBERS;
  var cats = EVENT_META.categories;
  function scC(v){ var n=parseFloat(v); return isNaN(n)?'#94a3b8':n>=8?'#059669':n>=6?'#d97706':'#dc2626'; }
  function ans(v){ return v==='○'?'<span class="ans-pill ans-y">○</span>':'<span class="ans-pill ans-n">—</span>'; }
  function seg(v){
    var map={'企業選抜':'seg-ent','ユース選抜':'seg-youth','AWARDから参加した人':'seg-award'};
    return '<span class="seg-pill '+(map[v]||'seg-other')+'">'+esc(v||'その他')+'</span>';
  }
  function step(v){ if(!v)return '—'; var n=parseInt(v.replace(/[^0-9]/g,'')); var col=n>=4?'#059669':n>=2?'#2563eb':'#94a3b8'; return '<span style="color:'+col+';font-weight:700;font-size:11px;font-family:\'Space Mono\'">S'+n+'</span>'; }
  function attDot(val){
    if(!val||val==='') return '<span class="att-dot att-none" title="記録なし"></span>';
    var v=val.trim();
    if(v==='出席'||v==='オンライン'||v==='出席予定'||v==='出席（徴収済）'||v==='出席（未徴収）')
      return '<span class="att-dot att-yes" title="'+v+'"></span>';
    if(v==='欠席'||v==='欠席予定')
      return '<span class="att-dot att-no" title="'+v+'"></span>';
    return '<span class="att-dot att-na" title="'+v+'"></span>';
  }
  function involveSelect(name){
    var cur=getMbInvolve(name);
    return '<select class="pt-status-sel" onchange="saveMbInvolve(\''+esc(name).replace(/'/g,'&#39;')+'\',this.value)">'
      +['','コア','アクティブ','カジュアル','離脱予備軍'].map(function(s){
        return '<option value="'+s+'" '+(cur===s?'selected':'')+'>'+( s||'未設定')+'</option>';
      }).join('')+'</select>';
  }
  var filterHtml = '<div class="list-filter-bar">'
    + '<input type="text" id="user-search" class="list-search" placeholder="🔍 名前・所属で検索..." oninput="filterUsers()">'
    + '<select id="user-seg-filter" class="list-filter-sel" onchange="filterUsers()">'

function filterUsers() {
  var q    = (document.getElementById('user-search')||{value:''}).value.toLowerCase();
  var seg  = (document.getElementById('user-seg-filter')||{value:''}).value;
  var invF = (document.getElementById('user-involve-filter')||{value:''}).value;
  var ansF = (document.getElementById('user-ans-filter')||{value:''}).value;
  var attF = (document.getElementById('user-att-filter')||{value:''}).value;
  var rows = document.querySelectorAll('.user-row');
  var shown = 0;
  rows.forEach(function(row){
    var nameMatch = !q || row.dataset.name.indexOf(q)>=0 || row.dataset.co.indexOf(q)>=0;
    var segMatch  = !seg  || row.dataset.seg===seg;
    var invMatch  = !invF || row.dataset.involve===invF;
    var ansVal = row.dataset.ans;
    var ansMatch  = !ansF
      ||(ansF==='3q'   && ansVal.indexOf('3')>=0)
      ||(ansF==='full' && ansVal==='123')
      ||(ansF==='none' && ansVal==='');
    var attVal = row.dataset.att;
    var attRate = parseFloat(attVal);
    var attMatch = !attF
      ||(attF==='high'   && !isNaN(attRate) && attRate>=80)
      ||(attF==='mid'    && !isNaN(attRate) && attRate>=50 && attRate<80)
      ||(attF==='low'    && !isNaN(attRate) && attRate<50)
      ||(attF==='nodata' && attVal==='nodata');
    var show = nameMatch && segMatch && invMatch && ansMatch && attMatch;
    row.style.display = show?'':'none';
    if(show) shown++;
  });
  var el=document.getElementById('user-count');
  if(el) el.textContent=shown+'名';
}

function saveCoDispatch(no, type, value){
  var key = type==='recruit' ? 'dispatch_recruit' : 'dispatch_labor';
  var edits = getLS('neo_company_edits_v4');
  if(!edits[no]) edits[no]={};
  edits[no][key] = value;
  setLS('neo_company_edits_v4', edits);
  // data属性も更新
  var row = document.querySelector('.co-row[data-name]');
  var rows = document.querySelectorAll('.co-row');
  rows.forEach(function(r){
    var sel = r.querySelector('select[onchange*="saveCoDispatch(\''+no+'\'"]');
    if(sel){ r.setAttribute('data-'+type, value); }
  });
  showToast(value?(type==='recruit'?'募集方法':'労務区分')+'を「'+value+'」に設定':'設定をクリア');
}

function buildDispatchAnalysisPanel() {

  function avg(arr, key){
    var v = arr.map(function(p){ return toF(p[key]); }).filter(function(x){ return x!=null; });
    return v.length ? (v.reduce(function(a,b){return a+b;},0)/v.length).toFixed(1) : null;
  }

  function getDispatch(no, type){

    {key:'生徒成長実感_1Q',  label:'生徒成長実感 1Q',  unit:'/10'},

    {key:'生徒成長実感_3Q',  label:'生徒成長実感 3Q',  unit:'/10'},
    {key:'生徒楽しさ_3Q',    label:'生徒楽しさ 3Q',    unit:'/10'},
    {key:'生徒おすすめ度_3Q',label:'生徒おすすめ 3Q',  unit:'/10'},
    {key:'企業満足度_1Q',    label:'企業満足度 1Q',    unit:'/10'},
    {key:'企業成長実感_1Q',  label:'企業成長実感 1Q',  unit:'/10'},
    {key:'企業満足度_3Q',    label:'企業満足度 3Q',    unit:'/10'},
    {key:'企業成長実感_3Q',  label:'企業成長実感 3Q',  unit:'/10'},
    {key:'企業おすすめ度_3Q',label:'企業おすすめ 3Q',  unit:'/10'},
    {key:'ステップ平均',     label:'ヒーローSステップ平均', unit:''},
  ];
  function buildDimTable(dim_label, groups){
    // グループを取得（LSから最新の設定値を読む）
    var group_data = groups.map(function(g){
      return {
        label: g.label,

    // テーブルHTML
    var html = '<div class="da-card">'
      +'<div class="da-card-title">'+dim_label+'</div>'
      // グループサマリーバッジ
      +'<div class="da-group-badges">'
      + group_data.map(function(g){
          return '<div class="da-badge" style="border-left:3px solid '+g.color+'">'
            +'<span class="da-badge-label" style="color:'+g.color+'">'+g.label+'</span>'
            +'<span class="da-badge-n">'+g.items.length+'社</span>'
            +'<div class="da-badge-cos">'
            + g.items.map(function(p){ return '<span class="da-co-chip">'+esc(p['企業名短'])+'</span>'; }).join('')
            +'</div></div>';
        }).join('')
      +'</div>'
      // スコア比較テーブル
      +'<div class="da-table-wrap"><table class="da-table">'
      +'<thead><tr><th class="da-th-metric">指標</th>'
      + group_data.map(function(g){
          return '<th style="color:'+g.color+'">'+g.label+'<br><span style="font-size:9px;font-weight:400">n='+g.items.length+'社</span></th>';
        }).join('')
      +(group_data.length===2 ? '<th class="da-th-diff">差分</th>' : '')
      +'</tr></thead><tbody>'
      + METRICS.map(function(m){
          var vals = group_data.map(function(g){ return avg(g.items, m.key); });
          var diff = (group_data.length===2 && vals[0]!=null && vals[1]!=null)
            ? (parseFloat(vals[0]) - parseFloat(vals[1])).toFixed(1) : null;
          var rowHl = diff!=null && Math.abs(parseFloat(diff)) >= 1.0 ? 'da-row-hl' : '';
          return '<tr class="'+rowHl+'">'
            +'<td class="da-td-metric">'+m.label+'</td>'
            + vals.map(function(v){
                return '<td class="da-td-val">'
                  +(v!=null ? '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+scC(v)+'">'+v+'</span>'
                            : '<span style="color:#94a3b8">—</span>')
                  +'</td>';
              }).join('')
            +(diff!=null
              ? '<td class="da-td-diff" style="color:'+(parseFloat(diff)>0?'#059669':parseFloat(diff)<0?'#dc2626':'#94a3b8')+'">'
                +(parseFloat(diff)>0?'▲':'')+(parseFloat(diff)<0?'▼':'')+Math.abs(parseFloat(diff))
                +'</td>'
              : '')
            +'</tr>';
        }).join('')
      +'</tbody></table></div>'
      // ステップ分布バー
      +'<div class="da-step-section"><div class="da-step-title">ヒーローステップ分布</div>'
      +'<div class="da-step-groups">'
      + group_data.map(function(g){
          var stepCounts = [0,1,2,3,4,5].map(function(n){
            return g.items.reduce(function(sum,p){ return sum+(p['ステップ分布']&&p['ステップ分布'][n]?parseInt(p['ステップ分布'][n]):0); }, 0);
          });
          var total = stepCounts.reduce(function(a,b){return a+b;},0)||1;
          return '<div class="da-step-group">'
            +'<div class="da-step-glabel" style="color:'+g.color+'">'+g.label+'（'+g.items.length+'社）</div>'
            +'<div class="da-step-bars">'
            + [0,1,2,3,4,5].map(function(n){
                var cnt=stepCounts[n], pct=Math.round(cnt/total*100);
                var col=n>=4?'#059669':n>=2?'#2563eb':'#94a3b8';
                return '<div class="da-step-item">'
                  +'<div class="da-step-bar-wrap"><div style="height:'+pct+'%;background:'+col+';border-radius:3px 3px 0 0;width:100%"></div></div>'
                  +'<div class="da-step-lbl">S'+n+'</div>'
                  +'<div class="da-step-cnt">'+cnt+'</div>'
                  +'</div>';
              }).join('')
            +'</div></div>';
        }).join('')
      +'</div></div>'
      +'</div>';
    return html;
  }
  // 設定ステータスバナー
  var statusBanner = '<div class="da-status-banner">'
    +'<div class="da-status-item">'
    +'<span class="da-status-label">公募/選抜 設定済み</span>'
    +'<span class="da-status-val" style="color:'+(set_recruit.length>0?'#059669':'#dc2626')+'">'+set_recruit.length+'社</span>'
    +(unset_r>0?'<span class="da-status-unset">未設定 '+unset_r+'社</span>':'')
    +'</div>'
    +'<div class="da-status-item">'
    +'<span class="da-status-label">労務内/外 設定済み</span>'
    +'<span class="da-status-val" style="color:'+(set_labor.length>0?'#059669':'#dc2626')+'">'+set_labor.length+'社</span>'
    +(unset_l>0?'<span class="da-status-unset">未設定 '+unset_l+'社</span>':'')
    +'</div>'
    +'<button class="da-refresh-btn" onclick="refreshDispatchAnalysis()">🔄 最新の設定を反映</button>'
    +'</div>';
  var note = '<div class="da-note">💡 企業一覧ページで「公募/選抜」「労務内/労務外」を設定すると、この分析に自動反映されます。未設定企業は分析対象外となります。</div>';
  // 公募/選抜 分析
  var recruit_groups = [
    {label:'公募', color:'#2563eb', filter:function(p){ return getDispatch(p['no'],'recruit')==='公募'; }},
    {label:'選抜', color:'#7c3aed', filter:function(p){ return getDispatch(p['no'],'recruit')==='選抜'; }},
  ];
  // 労務内/労務外 分析
  var labor_groups = [
    {label:'労務内', color:'#059669', filter:function(p){ return getDispatch(p['no'],'labor')==='労務内'; }},
    {label:'労務外', color:'#d97706', filter:function(p){ return getDispatch(p['no'],'labor')==='労務外'; }},
  ];
  return '<div id="dispatch-analysis-content">'
    + note + statusBanner
    + buildDimTable('📊 公募 vs 選抜 ｜生徒・企業アンケートスコア比較', recruit_groups)
    + buildDimTable('📊 労務内 vs 労務外 ｜生徒・企業アンケートスコア比較', labor_groups)
    + '</div>';
}

/* ══ 切り口別分析パネル ══ */
function buildAnalysisPanel(){
  var ps = PATTERNS;
  function toF(v){ var n=parseFloat(v); return isNaN(n)?null:n; }
  function avg(arr,k){
    var v=arr.map(function(p){return toF(p[k]);}).filter(function(x){return x!=null;});
    return v.length?(v.reduce(function(a,b){return a+b;},0)/v.length).toFixed(1):null;
  }
  function scC(v){ var n=toF(v); return n==null?'#94a3b8':n>=8?'#059669':n>=6?'#d97706':'#dc2626'; }
  // グループ定義
  var DIMS = [
    {
      id: 'dim-cont', label: '継続 / 非継続',
      groups: [
        {key:'継続', label:'継続', color:'#059669', filter: function(p){ return getStatus(p['no'])==='継続'||(getStatus(p['no'])===''&&p['継続']); }},
        {key:'非継続', label:'非継続', color:'#dc2626', filter: function(p){ return getStatus(p['no'])==='非継続'||(getStatus(p['no'])===''&&!p['継続']&&p['第2期契約']==='D：非継続'); }},
        {key:'想定内退会', label:'想定内退会', color:'#d97706', filter: function(p){ return getStatus(p['no'])==='想定内退会'; }},
      ]
    },
    {
      id: 'dim-recruit', label: '派遣方式：公募 / 選抜',
      groups: [
        {key:'公募', label:'公募', color:'#2563eb', filter: function(p){ return getLS('neo_company_edits_v4')[p['no']]&&getLS('neo_company_edits_v4')[p['no']]['dispatch_recruit']==='公募'; }},
        {key:'選抜', label:'選抜', color:'#7c3aed', filter: function(p){ return getLS('neo_company_edits_v4')[p['no']]&&getLS('neo_company_edits_v4')[p['no']]['dispatch_recruit']==='選抜'; }},
        {key:'未設定', label:'未設定', color:'#94a3b8', filter: function(p){ var ed=getLS('neo_company_edits_v4')[p['no']]; return !ed||!ed['dispatch_recruit']; }},
      ]
    },
    {
      id: 'dim-labor', label: '派遣方式：労務内 / 労務外',
      groups: [
        {key:'労務内', label:'労務内', color:'#2563eb', filter: function(p){ return getLS('neo_company_edits_v4')[p['no']]&&getLS('neo_company_edits_v4')[p['no']]['dispatch_labor']==='労務内'; }},
        {key:'労務外', label:'労務外', color:'#059669', filter: function(p){ return getLS('neo_company_edits_v4')[p['no']]&&getLS('neo_company_edits_v4')[p['no']]['dispatch_labor']==='労務外'; }},
        {key:'未設定', label:'未設定', color:'#94a3b8', filter: function(p){ var ed=getLS('neo_company_edits_v4')[p['no']]; return !ed||!ed['dispatch_labor']; }},
      ]
    },
    {
      id: 'dim-course', label: '参加コース（1期）',
      groups: [
        {key:'リーダー育成', label:'リーダー育成', color:'#2563eb', filter: function(p){ return p['第1期コース']==='リーダー育成'; }},
        {key:'事業共創', label:'事業共創', color:'#059669', filter: function(p){ return p['第1期コース']==='事業共創'; }},
        {key:'両方実施', label:'両方実施', color:'#7c3aed', filter: function(p){ return p['第1期コース']==='両方実施'; }},
        {key:'未参加', label:'未参加（2期新規）', color:'#94a3b8', filter: function(p){ return !p['第1期コース']||p['第1期コース']==='nan'; }},
      ]
    },
  ];
  var METRICS = [
    {key:'生徒満足度_3Q', label:'生徒満足度(3Q)'},
    {key:'生徒成長実感_3Q', label:'生徒成長実感(3Q)'},
    {key:'企業満足度_1Q', label:'企業満足度(1Q)'},
    {key:'企業満足度_2Q', label:'企業満足度(2Q)'},
    {key:'企業満足度_3Q', label:'企業満足度(3Q)'},
    {key:'企業成長実感_3Q', label:'企業成長実感(3Q)'},
    {key:'企業おすすめ度_3Q', label:'企業おすすめ度(3Q)'},
  ];
  function buildDimCard(dim){
    var html='<div class="pt-dim-card"><div class="pt-dim-title">'+dim.label+'</div>';
    html+='<table class="pt-compare-table"><thead><tr><th>グループ</th><th>社数</th>';
    METRICS.forEach(function(m){ html+='<th>'+m.label+'</th>'; });
    html+='</tr></thead><tbody>';
    dim.groups.forEach(function(g){
      var group = ps.filter(g.filter);
      if(!group.length) return;
      html+='<tr><td><span class="pt-grp-badge" style="background:'+g.color+'22;color:'+g.color+'">'+g.label+'</span></td>';
      html+='<td style="font-weight:700">'+group.length+'</td>';
      METRICS.forEach(function(m){
        var v=avg(group,m.key);
        html+='<td style="text-align:center;font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:'+scC(v)+'">'+(v||'—')+'</td>';
      });
      html+='</tr>';
      // 企業名リスト
      html+='<tr><td colspan="'+(METRICS.length+2)+'" style="padding:2px 8px 8px">';
      html+='<div style="display:flex;flex-wrap:wrap;gap:4px">';
      group.forEach(function(p){ html+='<span class="pt-co-chip">'+esc(p['企業名短'])+'</span>'; });
      html+='</div></td></tr>';
    });
    html+='</tbody></table></div>';
    return html;
  }
  var html='<div class="pt-analysis-wrap">'
    +'<div class="pt-analysis-note">💡 派遣方式（公募/選抜・労務内/労務外）は企業一覧で設定した値を反映します。</div>';
  DIMS.forEach(function(dim){ html+=buildDimCard(dim); });
  html+='<div class="pt-dim-card">'
    +'<div class="pt-dim-title">🔬 派遣方式 × アンケートスコア 詳細比較</div>'
    +buildDispatchAnalysisPanel()
    +'</div>';
  return html+'</div>';
}

    +ptGuide('Phase 3｜振り返り',['3Qアンケート結果を社内共有','来期コース・人数・方針を策定','OIP達成度を3軸で評価'],'#059669')
    +'</div>';
  return'<div>'
    +'<div class="sv-hd"><span class="sv-num">∑</span>サマリー</div>'+summaryHtml

function buildTablePanel(){

  function toF(v){var n=parseFloat(v);return isNaN(n)?null:n;}
  function scC(v){var n=toF(v);return n==null?'#94a3b8':n>=8?'#059669':n>=6?'#d97706':'#dc2626';}
  function scV(v){return v!=null&&v!=='None'&&v!=='null'?'<span style="color:'+scC(v)+';font-weight:700">'+v+'</span>':'<span style="color:#94a3b8">—</span>';}
  function contractBadge(c){var map={'S：契約書締結':'tb-s S','A：契約中':'tb-a A','B：内諾確認済':'tb-b B','C：社内調整中':'tb-c C','D：非継続':'tb-d D'};var v=map[c];return v?'<span class="'+v.split(' ')[0]+'">'+v.split(' ')[1]+'</span>':(c||'—');}
  var filterHtml='<div class="list-filter-bar">'
    +'<input type="text" id="pt-co-search" class="list-search" placeholder="🔍 企業名で検索..." oninput="refreshPtTable()">'
    +'<select id="pt-status-f" class="list-filter-sel" onchange="refreshPtTable()"><option value="">すべてのステータス</option>'
    +['継続','非継続','想定内退会'].map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('')
    +'</select>'
    +'<select id="pt-involve-f" class="list-filter-sel" onchange="refreshPtTable()"><option value="">すべての関与度</option>'
    +['コア','アクティブ','カジュアル','離脱予備軍'].map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('')
    +'</select>'
    +'<select id="pt-course-f" class="list-filter-sel" onchange="refreshPtTable()"><option value="">すべてのコース</option>'
    +['リーダー育成','事業共創','両方実施'].map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('')
    +'</select>'
    +'<span id="pt-co-count" class="list-count">'+ps.length+'社</span></div>';
  var tableHtml='<div id="pt-table-body">'+renderPtTable(ps)+'</div>';
  return filterHtml+tableHtml;
}
function renderPtTable(ps){
  function toF(v){var n=parseFloat(v);return isNaN(n)?null:n;}
  function scC(v){var n=toF(v);return n==null?'#94a3b8':n>=8?'#059669':n>=6?'#d97706':'#dc2626';}
  function scV(v){return v!=null&&v!=='None'&&v!=='null'?'<span style="color:'+scC(v)+';font-weight:700">'+v+'</span>':'<span style="color:#94a3b8">—</span>';}
  function contractBadge(c){var map={'S：契約書締結':'tb-s S','A：契約中':'tb-a A','B：内諾確認済':'tb-b B','C：社内調整中':'tb-c C','D：非継続':'tb-d D'};var v=map[c];return v?'<span class="'+v.split(' ')[0]+'">'+v.split(' ')[1]+'</span>':(c||'—');}
  function selStatus(no){
    var cur=getStatus(no);
    return'<select class="pt-status-sel" onchange="saveStatus(\''+no+'\',this.value)">'
      +['','継続','非継続','想定内退会'].map(function(s){return'<option value="'+s+'" '+(cur===s?'selected':'')+'>'+( s||'未設定')+'</option>';}).join('')+'</select>';
  }
  function selInvolve(no){
    var cur=getCoInvolve(no);
    return'<select class="pt-status-sel" onchange="saveCoInvolve(\''+no+'\',this.value)">'
      +['','コア','アクティブ','カジュアル','離脱予備軍'].map(function(s){return'<option value="'+s+'" '+(cur===s?'selected':'')+'>'+( s||'未設定')+'</option>';}).join('')+'</select>';
  }
  var sorted=ps.slice().sort(function(a,b){
    var o={'S：契約書締結':0,'A：契約中':1,'B：内諾確認済':2,'C：社内調整中':3,'D：非継続':4};
    return (o[a['第2期契約']]||5)-(o[b['第2期契約']]||5);
  });
  return'<div class="list-table-wrap"><table class="list-table"><thead><tr>'
    +'<th>企業名</th><th>契約</th><th>継続ステータス</th><th>関与度</th><th>1期コース</th><th>活用方針</th>'
    +'<th>派遣</th><th>卒業</th>'
    +'<th>生徒満3Q</th><th>生徒成長3Q</th>'
    +'<th>企業満1Q</th><th>企業満2Q</th><th>企業満3Q</th><th>企業薦3Q</th>'
    +'</tr></thead><tbody>'
    +sorted.map(function(p){
      var status=getStatus(p['no']);
      var involve=getCoInvolve(p['no']);
      return'<tr class="pt-co-row" '
        +'data-name="'+p['企業名'].toLowerCase()+'" '
        +'data-status="'+status+'" '
        +'data-involve="'+involve+'" '
        +'data-course="'+( p['第1期コース']||'')+'">'
        +'<td class="ul-name">'+esc(p['企業名短'])+'</td>'
        +'<td>'+contractBadge(p['第2期契約'])+'</td>'
        +'<td>'+selStatus(p['no'])+'</td>'
        +'<td>'+selInvolve(p['no'])+'</td>'
        +'<td><span class="pt-method">'+(p['第1期コース']||'—')+'</span></td>'
        +'<td><span class="pt-method">'+(p['活用方針']||'—')+'</span></td>'
        +'<td style="font-weight:700">'+(p['派遣人数']||0)+'名</td>'
        +'<td style="font-weight:700">'+(p['卒業人数']||0)+'名</td>'
        +[p['生徒満足度_3Q'],p['生徒成長実感_3Q'],p['企業満足度_1Q'],p['企業満足度_2Q'],p['企業満足度_3Q'],p['企業おすすめ度_3Q']].map(function(v){return'<td>'+scV(v)+'</td>';}).join('')
        +'</tr>';
    }).join('')
    +'</tbody></table></div>';
}
function refreshPtTable(){
  var q=(document.getElementById('pt-co-search')||{value:''}).value.toLowerCase();
  var sf=(document.getElementById('pt-status-f')||{value:''}).value;
  var inv=(document.getElementById('pt-involve-f')||{value:''}).value;
  var cf=(document.getElementById('pt-course-f')||{value:''}).value;
  var ps=PATTERNS;
  var filtered=ps.filter(function(p){
    var status=getStatus(p['no']);
    var involve=getCoInvolve(p['no']);
    return (!q||p['企業名'].toLowerCase().indexOf(q)>=0)
      &&(!sf||status===sf)
      &&(!inv||involve===inv)
      &&(!cf||p['第1期コース']===cf);
  });
  var el=document.getElementById('pt-table-body');
  if(el) el.innerHTML=renderPtTable(filtered);
  var cnt=document.getElementById('pt-co-count');
  if(cnt) cnt.textContent=filtered.length+'社';
}
function refreshStudentScores(){
  var s=SURVEY.student;
  var f=(document.getElementById('st-attr-filter')||{value:'all'}).value;
  var note=document.getElementById('st-filter-note');
  var area=document.getElementById('st-kpi-area');
  if(!area)return;
  function scC(v){var n=parseFloat(v);return isNaN(n)?'#94a3b8':n>=8?'#059669':n>=6?'#d97706':'#dc2626';}
  function kpiCard(label,q1,q2,q3,n1,n2,n3){
    function arw(a,b){if(a==null||b==null)return'';var d=parseFloat((b-a).toFixed(2));return d>0?'<span class="arr up">▲'+Math.abs(d)+'</span>':d<0?'<span class="arr dn">▼'+Math.abs(d)+'</span>':'<span class="arr nt">→</span>';}
    return'<div class="kpi-card"><div class="kpi-lbl">'+label+'</div><div class="kpi-body">'
      +'<div class="kpi-q"><div class="kpi-v" style="color:'+scC(q1)+'">'+( q1!=null?q1:'—')+'</div><div class="kpi-ql">1Q<br><span class="kpi-n">n='+(n1||'—')+'</span></div></div>'
      +arw(q1,q2)
      +'<div class="kpi-q"><div class="kpi-v" style="color:'+scC(q2)+'">'+( q2!=null?q2:'—')+'</div><div class="kpi-ql">2Q<br><span class="kpi-n">n='+(n2||'—')+'</span></div></div>'
      +arw(q2,q3)
      +'<div class="kpi-q kpi-q-hi"><div class="kpi-v-lg" style="color:'+scC(q3)+'">'+( q3!=null?q3:'—')+'</div><div class="kpi-ql">3Q<br><span class="kpi-n">n='+(n3||'—')+'</span></div></div>'
      +'</div><div class="kpi-unit">/10</div></div>';
  }
  var scores3, n3, label3;
  if(f==='all'){
    scores3=s.scores['3Q']; n3=s.n['3Q']; label3='全体';
  } else if(f.startsWith('seg_')){
    var seg=f.replace('seg_','');
    var d=s['by_seg_full']&&s['by_seg_full'][seg];
    scores3=d||{}; n3=d?d['n']:0; label3=seg;
  } else if(f==='step_high'){
    var sh=['ステップ4','ステップ5'];
    var combined={楽しさ:[],成長実感:[],満足度:[],おすすめ度:[]};
    sh.forEach(function(k){var d=s['by_step']&&s['by_step'][k];if(d){Object.keys(combined).forEach(function(m){if(d[m]!=null)combined[m].push({v:d[m],n:d['n']||0});});}});
    function wavg(arr){var sum=0,tot=0;arr.forEach(function(x){sum+=x.v*(x.n||1);tot+=(x.n||1);});return tot>0?Math.round(sum/tot*10)/10:null;}
    scores3={楽しさ:wavg(combined.楽しさ),成長実感:wavg(combined.成長実感),満足度:wavg(combined.満足度),おすすめ度:wavg(combined.おすすめ度)};
    n3='S4+S5'; label3='ステップ4・5（高）';
  } else if(f==='step_low'){
    var sl=['ステップ0','ステップ1','ステップ2'];
    var combined2={楽しさ:[],成長実感:[],満足度:[],おすすめ度:[]};
    sl.forEach(function(k){var d=s['by_step']&&s['by_step'][k];if(d){Object.keys(combined2).forEach(function(m){if(d[m]!=null)combined2[m].push({v:d[m],n:d['n']||0});});}});
    function wavg2(arr){var sum=0,tot=0;arr.forEach(function(x){sum+=x.v*(x.n||1);tot+=(x.n||1);});return tot>0?Math.round(sum/tot*10)/10:null;}
    scores3={楽しさ:wavg2(combined2.楽しさ),成長実感:wavg2(combined2.成長実感),満足度:wavg2(combined2.満足度),おすすめ度:wavg2(combined2.おすすめ度)};
    n3='S0-S2'; label3='ステップ0〜2（低）';
  } else if(f.startsWith('challenge_')){
    var ch=f.replace('challenge_','');
    var d2=s['by_challenge']&&s['by_challenge'][ch];
    scores3=d2||{}; n3=d2?d2['n']:0; label3='挑戦意欲:'+ch;
  }
  if(note) note.textContent='（'+label3+' / n='+n3+'）';
  var html='<div class="kpi-row">'
    +kpiCard('総合満足度',s.scores['1Q']['満足度'],s.scores['2Q']['満足度'],scores3['満足度'],s.n['1Q'],s.n['2Q'],n3)
    +kpiCard('楽しさ実感',s.scores['1Q']['楽しさ'],s.scores['2Q']['楽しさ'],scores3['楽しさ'],s.n['1Q'],s.n['2Q'],n3)
    +kpiCard('成長実感',s.scores['1Q']['成長実感'],s.scores['2Q']['成長実感'],scores3['成長実感'],s.n['1Q'],s.n['2Q'],n3)
    +kpiCard('おすすめ度',s.scores['1Q']['おすすめ度'],s.scores['2Q']['おすすめ度'],scores3['おすすめ度'],s.n['1Q'],s.n['2Q'],n3)
    +'</div>';
  area.innerHTML=html;
}
var surveysBuilt={students:false,enterprise:false,pattern:false,userlist:false,colist:false};
function switchTopTab(tab){
  var ALL_TABS=['companies','students','enterprise','pattern','userlist','colist'];
  // タブナビのactive切替
  ALL_TABS.forEach(function(t){
    var el=document.getElementById('ttab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  // companiesペイン（flex）
  document.getElementById('pane-companies').classList.toggle('active',tab==='companies');
  // scroll系ペイン
  ['students','enterprise','pattern','userlist','colist'].forEach(function(t){
    var el=document.getElementById('pane-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  // 遅延ビルド
  var builders={
    students:function(){return buildStudentTab();},
    enterprise:function(){return buildEnterpriseTab();},
    pattern:function(){return buildPatternTab();},
    userlist:function(){return buildUserListTab();},
    colist:function(){return buildCompanyListTab();}
  };
  if(builders[tab]&&!surveysBuilt[tab]){
    document.getElementById(tab+'-content').innerHTML=builders[tab]();
    surveysBuilt[tab]=true;
  }
}
